language: cpp
dist: focal

matrix:
  include:
    - compiler: gcc
      env: CXX_COMPILER=g++
    - compiler: clang
      env: CXX_COMPILER=clang++

before_install:
  - sudo apt-get update
  - sudo apt-get install -y cmake

script:
  - rm -rf _build
  - cmake -H. -B_build -DCMAKE_CXX_COMPILER=${CXX_COMPILER}
  - cmake --build _build